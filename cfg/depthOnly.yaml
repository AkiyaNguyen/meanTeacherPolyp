device: cuda
seed: 8888

model:
  pretrained: True
  stu_model:
    name: DepthOnlyResNet34U_f
  tea_model:
    name: DepthOnlyResNet34U_f_EMAEncoderOnly
  num_channels_output: 1

data:
  root: ../polypdepth_dataset/
  dataset: DepthOnlyDataset
  data2_dir: TrainDataset
  mask_dirname: masks
  depth_dirname: depth_npy  # Directory containing .npy depth files
  label_mode: percentage
  labeled_perc: 11
  labeled_bs: 2
  batch_size: 4
  shuffle: False
  num_workers: 0
  val_split_perc: 10
  eval:
    resize_width: 320
    resize_height: 320
  test:
    resize_width: 320
    resize_height: 320
    dataset_root: ../polypdepth_dataset/TestDataset/Kvasir
    mask_dirname: masks
    depth_dirname: depth_npy  # Directory containing .npy depth files for test set
    batch_size: 1

total_iter: 50000

optimizer:
  lr: 0.005
  weight_decay: 0.0001
  momentum: 0.9

scheduler:
  power: 0.9

Trainer:
  consistency_rampup: 5000.0
  consistency: 2
  ema_decay: 0.999
  fea_sim_weight: 0.5
  load_ckpt_path: null

Hook:
  MeanTeacherEvalHook:
    eval_every_epoch: 2
  ExtendMLFlowLoggerHook:
  ## params for base mlflowloggerhook
    dagshub_repo_owner: 'AkiyaNguyen'
    dagshub_repo_name: 'polyp_segmentation'
    experiment_name: 'ema_encoder_only_depth_npy'
    dir_save_plot: 'plots'
    logging_fields:
    - '*loss*'
    - '*weight*'
    - '*Dice*'
    - '*IoU*'
    - '*ACC_overall*'
  ## params for extendmlflowloggerhook
    local_dir_save_ckpt: 'ckpt'
    dagshub_dir_save_ckpt: 'ckpt'
    max_save_epoch_interval: 50
    criteria: test_stu_Dice
    dagshub_destination_src_file: 'src_file'
    list_src_dir_files: ['utils', 'test','models', 'data','depthOnlyTrain.py']
    dagshub_meta_dir: 'meta'
    run_name: 
    meta_info:
      kaggle_run_link: 
      dataset_link: https://www.kaggle.com/datasets/tay208/polypsegcandrl
  StopTrainAtEpoch:
    stop_at_epoch: 100

score_criteria: test_stu_Dice
