device: cuda
seed: 8888

model:
  stu_model:
    name: ResNet34U_f
  tea_model:
    name: DepthResidualSEFusion_ResNet34U_f_EMAEncoderOnly
  num_channels_output: 1
data:
  root: ../polypdepth_dataset/
  dataset: kvasir_SEG
  data2_dir: TrainDataset
  require_depth: true
  label_mode: percentage
  labeled_perc: 10
  labeled_bs: 2
  batch_size: 4
  shuffle: False
  num_workers: 0
  val_split_perc: 20 # 20% of the training data for validation
  test:
    resize_width: 320
    resize_height: 320
    dataset_root: ../polypdepth_dataset/TestDataset/Kvasir 
    image_dirname: images
    mask_dirname: masks
    depth_dirname: depth-v1
    require_depth: true
    batch_size: 1

total_iter: 50000

optimizer:
  lr: 0.005 #
  weight_decay: 0.0001 #
  momentum: 0.9

scheduler:
  power: 0.9

Trainer:
  consistency_rampup: 5000.0 #
  consistency: 2 #
  ema_decay: 0.999
  fea_discrepancy_weight: 0.15
  fea_discrepancy_rampup: 8000.0
  
  # weight-decay: 0.0001
Hook:
  FrequentSaveModel:
    save_dir: save_dir/
    save_every_epoch: 5
    save_name: ema_encoder_only
  SmartSaveHook:
    save_dir: save_dir/
    max_save_epoch_interval: 50
    save_name: ema_encoder_only
    criteria: test_stu_Dice
  MeanTeacherEvalHook:
    eval_every_epoch: 2
  MLFlowLoggerHook:
    dagshub_token: 
    dagshub_repo_owner: 'AkiyaNguyen'
    dagshub_repo_name: 'polyp_segmentation'
    experiment_name: 'ema_encoder_only'
    dir_save_plot: 'plots'
    logging_fields:
    - '*loss*'
    - '*weight*'
    - '*Dice*'
    - '*IoU*'
    - '*ACC_overall*'
  StopTrainAtEpoch:
    stop_at_epoch: 1000

score_criteria: test_stu_Dice

hyperparameter_sweeping:
  Trainer.fea_discrepancy_weight:
    method: suggest_float
    params:
      name: fea_discrepancy_weight
      low: 0.05
      high: 0.3
  Trainer.fea_discrepancy_rampup:
    method: suggest_float
    params:
      name: fea_discrepancy_rampup
      low: 1500.0
      high: 4000.0
    